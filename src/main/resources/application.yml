spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.placarcopa.messaging.MatchEventMessage
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.placarcopa.messaging
  application:
    name: placar-copa
  config:
    import: "optional:file:.env[.properties]"
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/placarcopa
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

api-football:
  base-url: https://v3.football.api-sports.io
  key: ${APIFOOTBALL_KEY:}

ingestao:
  agendada:
    habilitada: true
    intervalo: 60s
    # ligas: "1,2"  # opcional; vazio = todos os jogos ao vivo
