services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - placarcopa-network
    container_name: placarcopa-db
    environment:
      POSTGRES_DB: placarcopa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - placarcopa-data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:latest
    restart: unless-stopped
    networks:
      - placarcopa-network
    container_name: placarcopa-kafka
    depends_on:
      - postgres
    ports:
      - "9092:9092"
    environment:
      # Modo KRaft (sem Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # PLAINTEXT (29092) para dentro da rede docker; PLAINTEXT_HOST (9092) para o host
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - placarcopa-network
    container_name: placarcopa-redis
    ports:
      - "6379:6379"

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    restart: unless-stopped
    networks:
      - placarcopa-network
    depends_on:
      - kafka
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092

networks:
  placarcopa-network:

volumes:
  placarcopa-data:
